<div class="auth-page">
  <mat-card class="auth-card">
    <h2>Welcome Back</h2>
    <p class="auth-subtitle">Login to your DestPlanner account</p>

    <form [formGroup]="loginForm" (ngSubmit)="submit()">

      <mat-form-field appearance="outline">
        <mat-label>Email</mat-label>
        <input matInput type="email" formControlName="email" placeholder="you@email.com">
        <mat-error *ngIf="loginForm.get('email')?.hasError('required')">Email is required</mat-error>
        <mat-error *ngIf="loginForm.get('email')?.hasError('email')">Enter a valid email</mat-error>
      </mat-form-field>

      <mat-form-field appearance="outline">
        <mat-label>Password</mat-label>
        <input matInput type="password" formControlName="password" placeholder="Your password">
        <mat-error *ngIf="loginForm.get('password')?.hasError('required')">Password is required</mat-error>
      </mat-form-field>

      <mat-checkbox formControlName="rememberMe">Remember me</mat-checkbox>

      <button mat-raised-button class="register-btn" type="submit" [disabled]="loading">
        {{ loading ? 'Logging in...' : 'Login' }}
      </button>

    </form>

    <div class="auth-switch">
      Don't have an account?
      <span (click)="navigateToRegister()">Register</span>
    </div>
  </mat-card>
</div>
